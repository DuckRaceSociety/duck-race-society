<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<title>Duck Race Society</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>

<style>

:root{
--gold:#FFD700;
--bg:#0f0f0f;
--card:#1b1b1b;
}

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
font-family:'Orbitron',sans-serif;
background:var(--bg);
color:white;
text-align:center;
padding:0 10px;
}

header{
background:black;
padding:18px;
border-bottom:2px solid var(--gold);
}

h1{
color:var(--gold);
margin:0;
font-size:22px;
}

.section{
padding:25px 5px;
}

button{
width:100%;
padding:18px;
margin:10px 0;
border:none;
border-radius:12px;
background:var(--gold);
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.race-track{
background:#222;
border-radius:10px;
padding:8px;
margin-top:15px;
position:relative;
}

.finish{
position:absolute;
right:5px;
top:0;
bottom:0;
width:4px;
background:red;
}

.lane{
position:relative;
height:45px;
margin:8px 0;
background:#333;
border-radius:8px;
overflow:hidden;
}

.duck{
position:absolute;
left:0;
top:5px;
font-size:28px;
will-change:left;
}

.leaderboard{
background:var(--card);
border-radius:10px;
padding:12px;
text-align:left;
font-size:14px;
}

.countdown{
color:var(--gold);
margin-bottom:10px;
font-size:14px;
}

.status{
margin-top:10px;
color:#aaa;
font-size:14px;
}

.betStatus{
color:#00ff9c;
font-size:14px;
}

footer{
padding:15px;
background:black;
border-top:2px solid var(--gold);
margin-top:30px;
font-size:12px;
}

</style>

</head>

<body>

<header>
<h1>🦆 Duck Race Society</h1>
<p>Solana Web3 Duck Racing</p>
</header>

<section class="section">

<h2>Wallet</h2>

<button id="walletBtn">Connect Phantom</button>

<p id="walletStatus">Not connected</p>

</section>

<section class="section">

<h2>Betting</h2>

<button onclick="betDuck(0)">Bet TRC Duck</button>
<button onclick="betDuck(1)">Bet TRC Duck</button>
<button onclick="betDuck(2)">Bet TRC Duck</button>
<button onclick="betDuck(3)">Bet TRC Duck</button>

<p class="betStatus" id="betStatus"></p>

<p>Prize Pool: <span id="pool">0</span> SOL</p>

</section>

<section class="section">

<h2>Next Race</h2>

<div class="countdown" id="countdown"></div>

<button id="startRace">Start Race</button>
<button id="resetRace">Reset Race</button>

<div class="status" id="raceStatus">Waiting...</div>

</section>

<section class="section">

<h2>Race Track</h2>

<div class="race-track">

<div class="finish"></div>

<div class="lane"><div class="duck">🦆</div></div>
<div class="lane"><div class="duck">🦆</div></div>
<div class="lane"><div class="duck">🦆</div></div>
<div class="lane"><div class="duck">🦆</div></div>

</div>

</section>

<section class="section">

<h2>Leaderboard</h2>

<div class="leaderboard" id="leaderboard"></div>

</section>

<footer>

<p>© 2026 Duck Race Society</p>

</footer>

<script>

const ducks=[...document.querySelectorAll(".duck")]

let wins=JSON.parse(localStorage.getItem("duckWins"))||[0,0,0,0]

let running=false

let bets=[0,0,0,0]

let prizePool=0

const trackWidth=Math.min(window.innerWidth,500)-90

let provider
let walletAddress

const connection=new solanaWeb3.Connection(
"https://api.mainnet-beta.solana.com"
)

function updateLeaderboard(){

const names=[
"Pirate Duck",
"Cyber Duck",
"Golden Duck",
"Alien Duck"
]

const board=document.getElementById("leaderboard")

board.innerHTML=names.map((n,i)=>`
<div>
<span>${n}</span>
<span>${wins[i]} Wins</span>
</div>
`).join("")

localStorage.setItem("duckWins",JSON.stringify(wins))

}

updateLeaderboard()

function startRace(){

if(running)return

if(prizePool===0){

alert("No bets placed")

return

}

running=true

let pos=[0,0,0,0]

document.getElementById("raceStatus").textContent="Race started!"

function frame(){

if(!running)return

ducks.forEach((d,i)=>{

pos[i]+=Math.random()*2.2

d.style.left=pos[i]+"px"

if(pos[i]>trackWidth){

running=false

wins[i]++

updateLeaderboard()

document.getElementById("raceStatus").textContent=
"🏆 Winner Duck "+(i+1)

let payout=prizePool*0.9

alert("Winner gets "+payout+" SOL")

}

})

requestAnimationFrame(frame)

}

frame()

}

function resetRace(){

running=false

bets=[0,0,0,0]

prizePool=0

document.getElementById("pool").innerText="0"

document.getElementById("betStatus").innerText=""

ducks.forEach(d=>d.style.left="0px")

document.getElementById("raceStatus").textContent="Race reset"

}

document.getElementById("startRace").onclick=startRace
document.getElementById("resetRace").onclick=resetRace

async function connectWallet(){

if("solana" in window){

provider=window.solana

if(provider.isPhantom){

const resp=await provider.connect()

walletAddress=resp.publicKey.toString()

document.getElementById("walletStatus").innerText=
walletAddress.slice(0,6)+"..."+walletAddress.slice(-4)

}

}else{

alert("Install Phantom Wallet")

}

}

document.getElementById("walletBtn").onclick=connectWallet

async function betDuck(duck){

if(!provider){

alert("Connect wallet first")

return

}

bets[duck]++

prizePool+=0.01

document.getElementById("pool").innerText=prizePool

document.getElementById("betStatus").innerText=
"Bet placed on Duck "+(duck+1)

}

// Countdown

const raceDate = new Date("2026-04-01T20:00:00").getTime()

setInterval(()=>{

const now=Date.now()
const dist=raceDate-now

const d=Math.floor(dist/86400000)
const h=Math.floor((dist%86400000)/3600000)
const m=Math.floor((dist%3600000)/60000)

document.getElementById("countdown").textContent=
`Next Race: ${d}d ${h}h ${m}m`

},1000)

</script>

</body>
</html
