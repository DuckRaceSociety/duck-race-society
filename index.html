<!DOCTYPE html>
<html>
<head>

<title>Duck Race Society</title>

<style>

body{
background:linear-gradient(#4ec5ff,#87e1ff);
font-family:Arial;
text-align:center;
}

h1{
color:white;
font-size:50px;
}

.track{
width:900px;
margin:auto;
margin-top:40px;
}

.lane{
height:70px;
background:white;
margin:10px 0;
border-radius:40px;
position:relative;
}

.finish{
position:absolute;
right:0;
top:0;
bottom:0;
width:6px;
background:red;
}

.duck{
position:absolute;
left:10px;
top:15px;
font-size:40px;
}

button{
margin-top:20px;
padding:15px 30px;
font-size:20px;
background:#ffd000;
border:none;
border-radius:10px;
cursor:pointer;
}

input{
padding:10px;
font-size:16px;
border-radius:8px;
border:none;
}

#winner{
font-size:35px;
color:white;
margin-top:20px;
}

</style>
</head>

<body>

<h1>🦆 Duck Race Society</h1>

<input id="wallet" placeholder="Enter Wallet Name">

<button onclick="addDuck()">Add Duck</button>

<button onclick="startRace()">Start Race</button>

<div class="track" id="track"></div>

<div id="winner"></div>

<script>

let ducks=[]
let positions=[]

function addDuck(){

let wallet=document.getElementById("wallet").value

if(wallet==="") return

let lane=document.createElement("div")
lane.className="lane"

let duck=document.createElement("div")
duck.className="duck"
duck.innerHTML="🦆 "+wallet

let finish=document.createElement("div")
finish.className="finish"

lane.appendChild(duck)
lane.appendChild(finish)

document.getElementById("track").appendChild(lane)

ducks.push(duck)
positions.push(10)

}

function startRace(){

let race=setInterval(function(){

for(let i=0;i<ducks.length;i++){

positions[i]+=Math.random()*12

ducks[i].style.left=positions[i]+"px"

if(positions[i]>800){

clearInterval(race)

document.getElementById("winner").innerHTML=
"🏆 Winner: "+ducks[i].innerText

}

}

},100)

}

</script>

</body>
</html>
