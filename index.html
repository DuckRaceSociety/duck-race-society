<!DOCTYPE html>
<html>
<head>
<title>Duck Race Society 🦆</title>
<style>
body{
font-family:Arial;
text-align:center;
background:#0f172a;
color:white;
}

h1{
color:#facc15;
}

.track{
width:90%;
height:300px;
border:3px solid white;
margin:auto;
position:relative;
overflow:hidden;
}

.duck{
position:absolute;
font-size:30px;
left:0;
}

button{
padding:10px 20px;
font-size:18px;
margin:10px;
cursor:pointer;
}
</style>
</head>

<body>

<h1>Duck Race Society (TRC) 🦆🔥</h1>

<p>Enter your wallet to join the race</p>

<input id="wallet" placeholder="Enter Wallet Address">
<button onclick="addDuck()">Join Race</button>

<div class="track" id="track"></div>

<button onclick="startRace()">Start Race</button>

<script>

let ducks=[]
let track=document.getElementById("track")

function addDuck(){

let wallet=document.getElementById("wallet").value

if(wallet=="") return

let duck=document.createElement("div")

duck.className="duck"
duck.innerHTML="🦆 "+wallet.slice(0,6)

duck.style.top=(ducks.length*30)+"px"

track.appendChild(duck)

ducks.push(duck)

document.getElementById("wallet").value=""

}

function startRace(){

ducks.forEach(duck=>{

let distance=Math.random()*800

duck.style.transition="5s"

duck.style.left=distance+"px"

})

}

</script>

</body>
</html>
