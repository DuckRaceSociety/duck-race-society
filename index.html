<!DOCTYPE html>
<html>
<head>

<title>Duck Race Society TRC</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
background:linear-gradient(120deg,#4ec5ff,#7cf0ff,#ffd000);
background-size:400% 400%;
animation:bgmove 12s infinite;
}

@keyframes bgmove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

h1{
color:white;
font-size:50px;
text-shadow:0 0 20px #fff;
}

.track{
width:1000px;
margin:auto;
margin-top:40px;
}

.lane{
height:60px;
background:white;
margin:6px 0;
border-radius:40px;
position:relative;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

.finish{
position:absolute;
right:0;
top:0;
bottom:0;
width:8px;
background:red;
}

.duck{
position:absolute;
left:10px;
top:12px;
font-size:30px;
animation:bounce 0.8s infinite;
}

@keyframes bounce{
0%{transform:translateY(0)}
50%{transform:translateY(-5px)}
100%{transform:translateY(0)}
}

button{
margin-top:20px;
padding:18px 40px;
font-size:22px;
background:#ffd000;
border:none;
border-radius:10px;
cursor:pointer;
box-shadow:0 0 20px #ffd000;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 40px #ffd000;
}

#winner{
font-size:40px;
color:white;
margin-top:30px;
animation:flash 1s infinite;
}

@keyframes flash{
0%{opacity:1}
50%{opacity:0.5}
100%{opacity:1}
}

.legendary{color:gold}
.epic{color:#a335ee}
.rare{color:#0070ff}
.common{color:#555}

</style>
</head>

<body>

<h1>🦆 Duck Race Society (TRC)</h1>

<button onclick="startRace()">START RACE</button>

<div class="track" id="track"></div>

<div id="winner"></div>

<script>

let ducks=[]
let positions=[]

let rarities=["legendary","epic","rare","common"]

function createDucks(){

let track=document.getElementById("track")

for(let i=0;i<40;i++){

let lane=document.createElement("div")
lane.className="lane"

let duck=document.createElement("div")
duck.className="duck"

let rarity=rarities[Math.floor(Math.random()*rarities.length)]

duck.classList.add(rarity)

duck.innerHTML="🦆 "+rarity.toUpperCase()

let finish=document.createElement("div")
finish.className="finish"

lane.appendChild(duck)
lane.appendChild(finish)

track.appendChild(lane)

ducks.push({element:duck,rarity:rarity})

positions.push(10)

}

}

function rarityBoost(rarity){

if(rarity=="legendary") return 18
if(rarity=="epic") return 14
if(rarity=="rare") return 12
return 10

}

function startRace(){

let race=setInterval(function(){

for(let i=0;i<ducks.length;i++){

let speed=Math.random()*rarityBoost(ducks[i].rarity)

positions[i]+=speed

ducks[i].element.style.left=positions[i]+"px"

if(positions[i]>900){

clearInterval(race)

document.getElementById("winner").innerHTML=
"🏆 WINNER: "+ducks[i].rarity.toUpperCase()+" DUCK"

}

}

},100)

}

createDucks()

</script>

</body>
</html>
