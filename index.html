<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Duck Race Society</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, sans-serif;
background:#0f172a;
color:white;
text-align:center;
padding:30px;
}

h1{
font-size:36px;
margin-bottom:10px;
}

#player{
font-size:20px;
margin-bottom:30px;
color:#22c55e;
}

.lobby{
background:#1e293b;
padding:20px;
border-radius:15px;
max-width:400px;
margin:auto;
box-shadow:0 0 20px rgba(0,0,0,0.4);
}

ul{
list-style:none;
padding:0;
margin:20px 0;
}

li{
background:#334155;
margin:8px 0;
padding:10px;
border-radius:8px;
}

button{
width:100%;
padding:15px;
margin-top:10px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
}

.join{
background:#22c55e;
color:white;
}

.start{
background:#3b82f6;
color:white;
}

</style>

</head>

<body>

<h1>🦆 Duck Race Lobby</h1>

<div id="player">
Spieler wird geladen...
</div>

<div class="lobby">

<h2>Players</h2>

<ul id="players"></ul>

<button class="join" onclick="joinRace()">
🦆 Join Race
</button>

<button class="start" onclick="startRace()">
🏁 Start Race
</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDjdM2QAPbNwQXlnFbS9pf9Yi9eH1aK42c",
  authDomain: "duck-race-society.firebaseapp.com",
  projectId: "duck-race-society",
  storageBucket: "duck-race-society.firebasestorage.app",
  messagingSenderId: "249037009909",
  appId: "1:249037009909:web:d00e0ff240218fb8aaa6bc"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const tg = window.Telegram.WebApp;

tg.ready();
tg.expand();

let playerName = "Gast";

if(tg.initDataUnsafe && tg.initDataUnsafe.user){

playerName = tg.initDataUnsafe.user.first_name;

}

document.getElementById("player").innerHTML =
"👤 Spieler: " + playerName;

let players = [];

function updatePlayers(){

const list = document.getElementById("players");

list.innerHTML = "";

players.forEach((p)=>{

const li = document.createElement("li");

li.innerText = p;

list.appendChild(li);

});

}

window.joinRace = async function(){

await addDoc(collection(db,"lobby"),{
name: playerName
});

}

window.startRace = function(){

if(players.length < 2){

alert("⚠️ Mindestens 2 Spieler benötigt");

return;

}

alert("🏁 Race startet mit " + players.length + " Spielern");

}

onSnapshot(collection(db,"lobby"),(snapshot)=>{

players = [];

snapshot.forEach((doc)=>{

players.push(doc.data().name);

});

updatePlayers();

});

</script>

</body>
</html>
