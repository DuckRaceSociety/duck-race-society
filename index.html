<!DOCTYPE html>
<html>
<head>

<title>Duck Race Society</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
background:linear-gradient(#5cc8ff,#b4ecff);
overflow:hidden;
}

h1{
color:white;
font-size:50px;
margin-top:20px;
}

.track{
width:1000px;
margin:auto;
margin-top:40px;
}

.lane{
height:90px;
background:white;
margin:15px 0;
border-radius:50px;
position:relative;
box-shadow:0 5px 10px rgba(0,0,0,0.2);
}

.finish{
position:absolute;
right:0;
top:0;
bottom:0;
width:6px;
background:red;
}

.duck{
position:absolute;
left:10px;
top:20px;
width:60px;
}

button{
margin-top:20px;
padding:15px 30px;
font-size:20px;
background:#ffd000;
border:none;
border-radius:10px;
cursor:pointer;
box-shadow:0 0 20px #ffd000;
}

button:hover{
transform:scale(1.1);
}

#winner{
font-size:40px;
color:white;
margin-top:30px;
animation:pop 1s infinite alternate;
}

@keyframes pop{
from{transform:scale(1)}
to{transform:scale(1.1)}
}

.water{
position:fixed;
bottom:0;
left:0;
width:100%;
height:120px;
background:linear-gradient(#3bb0ff,#1a8cff);
animation:wave 4s infinite linear;
}

@keyframes wave{
0%{background-position:0 0}
100%{background-position:1000px 0}
}

</style>
</head>

<body>

<h1>🦆 Duck Race Society</h1>

<button onclick="startRace()">START RACE</button>

<div class="track">

<div class="lane">
<img src="duck.png" class="duck" id="duck1">
<div class="finish"></div>
</div>

<div class="lane">
<img src="duck.png" class="duck" id="duck2">
<div class="finish"></div>
</div>

<div class="lane">
<img src="duck.png" class="duck" id="duck3">
<div class="finish"></div>
</div>

<div class="lane">
<img src="duck.png" class="duck" id="duck4">
<div class="finish"></div>
</div>

<div class="lane">
<img src="duck.png" class="duck" id="duck5">
<div class="finish"></div>
</div>

</div>

<div id="winner"></div>

<div class="water"></div>

<script>

function startRace(){

let ducks=[
document.getElementById("duck1"),
document.getElementById("duck2"),
document.getElementById("duck3"),
document.getElementById("duck4"),
document.getElementById("duck5")
]

let positions=[10,10,10,10,10]

let race=setInterval(function(){

for(let i=0;i<ducks.length;i++){

positions[i]+=Math.random()*15

ducks[i].style.left=positions[i]+"px"

if(positions[i]>900){

clearInterval(race)

document.getElementById("winner").innerHTML=
"🏆 WINNER DUCK "+(i+1)

}

}

},100)

}

</script>

</body>
</html>
