<!DOCTYPE html>
<html lang="de">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Duck Race Society</title>

<!-- Telegram WebApp Script -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:#0f172a;
    color:white;
    margin-top:50px;
}

h1{
    font-size:40px;
}

#player{
    font-size:24px;
    margin-top:20px;
}

button{
    margin-top:30px;
    padding:15px 30px;
    font-size:20px;
    border:none;
    border-radius:10px;
    background:#22c55e;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#16a34a;
}

</style>

</head>

<body>

<h1>🦆 Duck Race Society</h1>

<div id="player">
Spieler wird geladen...
</div>

<button onclick="startRace()">
🏁 Race starten
</button>


<script>

// Telegram WebApp starten
const tg = window.Telegram.WebApp;

tg.ready();
tg.expand();

let playerName = "Gast";

// Telegram User Daten lesen
if (tg.initDataUnsafe && tg.initDataUnsafe.user) {

    const user = tg.initDataUnsafe.user;

    playerName = user.first_name;

    document.getElementById("player").innerHTML =
        "👤 Spieler: " + playerName;

} else {

    document.getElementById("player").innerHTML =
        "⚠️ Telegram User nicht erkannt";

}

// Beispiel Race Start
function startRace(){

    alert("🏁 Race gestartet für " + playerName);

}

</script>

</body>
</html>
