<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Duck Race Society</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

:root{
--gold:#FFD700;
--bg:#0f0f0f;
--card:#1b1b1b;
}

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
font-family:'Orbitron',sans-serif;
background:var(--bg);
color:white;
max-width:500px;
margin:auto;
text-align:center;
}

header{
background:black;
padding:20px;
border-bottom:2px solid var(--gold);
}

h1{
color:var(--gold);
margin:0;
font-size:26px;
}

.section{
padding:35px 20px;
}

h2{
color:var(--gold);
margin-bottom:15px;
}

button{
width:100%;
padding:16px;
margin:8px 0;
border:none;
border-radius:10px;
background:var(--gold);
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#ffcc00;
}

.race-track{
background:#222;
border-radius:10px;
padding:10px;
margin-top:20px;
}

.lane{
position:relative;
height:50px;
margin:10px 0;
background:#333;
border-radius:8px;
overflow:hidden;
}

.duck{
position:absolute;
left:0;
top:5px;
font-size:30px;
}

.leaderboard{
background:var(--card);
border-radius:10px;
padding:15px;
text-align:left;
}

.leaderboard div{
display:flex;
justify-content:space-between;
margin:6px 0;
}

.countdown{
margin-top:10px;
color:var(--gold);
}

footer{
padding:20px;
background:black;
border-top:2px solid var(--gold);
margin-top:40px;
}

iframe{
width:100%;
height:220px;
border:none;
border-radius:10px;
}

</style>

</head>

<body>

<header>

<h1>Duck Race Society</h1>
<p>Web3 Duck Racing Game</p>

</header>

<section class="section">

<h2>Connect Wallet</h2>

<button id="walletBtn">Connect MetaMask</button>

<p id="walletStatus"></p>

</section>

<section class="section">

<h2>Next Race</h2>

<div class="countdown" id="countdown"></div>

<button id="startRace">Start Duck Race</button>

</section>

<section class="section">

<h2>Duck Race</h2>

<div class="race-track">

<div class="lane">
<div class="duck" id="duck1">🦆</div>
</div>

<div class="lane">
<div class="duck" id="duck2">🦆</div>
</div>

<div class="lane">
<div class="duck" id="duck3">🦆</div>
</div>

<div class="lane">
<div class="duck" id="duck4">🦆</div>
</div>

</div>

</section>

<section class="section">

<h2>Leaderboard</h2>

<div class="leaderboard" id="leaderboard">

<div><span>Pirate Duck</span><span>0 Wins</span></div>
<div><span>Cyber Duck</span><span>0 Wins</span></div>
<div><span>Golden Duck</span><span>0 Wins</span></div>
<div><span>Alien Duck</span><span>0 Wins</span></div>

</div>

</section>

<section class="section">

<h2>Live Stream</h2>

<iframe src="https://www.youtube.com/embed/live_stream?channel=" allowfullscreen></iframe>

</section>

<footer>

<p>© 2026 Duck Race Society</p>

</footer>

<script>

let wins=[0,0,0,0]

const ducks=[
document.getElementById("duck1"),
document.getElementById("duck2"),
document.getElementById("duck3"),
document.getElementById("duck4")
]

function startRace(){

ducks.forEach(d=>{
d.style.left="0px"
})

let race=setInterval(()=>{

ducks.forEach(d=>{

let current=parseInt(d.style.left)||0
let move=Math.random()*20

d.style.left=current+move+"px"

if(current>320){

clearInterval(race)

let winner=ducks.indexOf(d)

wins[winner]++

updateLeaderboard()

alert("Winner: Duck "+(winner+1))

}

})

},100)

}

function updateLeaderboard(){

const board=document.getElementById("leaderboard")

board.innerHTML=`
<div><span>Pirate Duck</span><span>${wins[0]} Wins</span></div>
<div><span>Cyber Duck</span><span>${wins[1]} Wins</span></div>
<div><span>Golden Duck</span><span>${wins[2]} Wins</span></div>
<div><span>Alien Duck</span><span>${wins[3]} Wins</span></div>
`

}

document.getElementById("startRace").onclick=startRace

// Countdown

const raceDate = new Date("2026-04-01T20:00:00").getTime()
const countdown=document.getElementById("countdown")

setInterval(()=>{

const now=Date.now()
const distance=raceDate-now

const days=Math.floor(distance/86400000)
const hours=Math.floor((distance%86400000)/3600000)
const minutes=Math.floor((distance%3600000)/60000)

countdown.textContent=
`Next Race: ${days}d ${hours}h ${minutes}m`

},1000)

// Wallet Connect (basic)

document.getElementById("walletBtn").onclick=async()=>{

if(window.ethereum){

try{

const accounts=await ethereum.request({method:"eth_requestAccounts"})

document.getElementById("walletStatus").textContent=
"Connected: "+accounts[0]

}catch{

alert("Connection rejected")

}

}else{

alert("MetaMask not installed")

}

}

</script>

</body>
</html>
