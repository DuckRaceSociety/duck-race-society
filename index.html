<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Duck Race Society</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<script defer src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>

<style>

:root{
--gold:#FFD700;
--bg:#0f0f0f;
--card:#1b1b1b;
}

body{
margin:0;
font-family:'Orbitron',sans-serif;
background:var(--bg);
color:white;
text-align:center;
padding:10px;
}

header{
background:black;
padding:15px;
border-bottom:2px solid var(--gold);
}

h1{
margin:0;
color:var(--gold);
font-size:22px;
}

button{
width:100%;
padding:16px;
margin:8px 0;
border:none;
border-radius:10px;
background:var(--gold);
font-size:16px;
font-weight:bold;
}

.section{
padding:20px 5px;
}

.race-track{
background:#222;
padding:10px;
border-radius:10px;
}

.lane{
height:40px;
background:#333;
margin:8px 0;
border-radius:6px;
position:relative;
overflow:hidden;
}

.duck{
position:absolute;
left:0;
top:5px;
font-size:28px;
}

.finish{
position:absolute;
right:0;
top:0;
bottom:0;
width:4px;
background:red;
}

.status{
margin-top:10px;
color:#aaa;
}

.pool{
color:#00ff9c;
font-size:16px;
}

</style>

</head>

<body>

<header>

<h1>🦆 Duck Race Society</h1>
<p>Solana Web3 Racing</p>

</header>

<section class="section">

<h2>Wallet</h2>

<button id="connectBtn">Connect Phantom</button>

<p id="walletStatus">Not connected</p>

</section>

<section class="section">

<h2>Bet</h2>

<button onclick="bet(0)">Bet Pirate Duck</button>
<button onclick="bet(1)">Bet Cyber Duck</button>
<button onclick="bet(2)">Bet Golden Duck</button>
<button onclick="bet(3)">Bet Alien Duck</button>

<p class="pool">Prize Pool: <span id="pool">0</span> SOL</p>

</section>

<section class="section">

<h2>Race</h2>

<button onclick="startRace()">Start Race</button>
<button onclick="resetRace()">Reset Race</button>

<p class="status" id="raceStatus">Waiting...</p>

<div class="race-track">

<div class="finish"></div>

<div class="lane"><div class="duck">🦆</div></div>
<div class="lane"><div class="duck">🦆</div></div>
<div class="lane"><div class="duck">🦆</div></div>
<div class="lane"><div class="duck">🦆</div></div>

</div>

</section>

<script>

let provider
let walletAddress

let prizePool=0
let bets=[0,0,0,0]

const ducks=[...document.querySelectorAll(".duck")]

let running=false

const trackWidth=Math.min(window.innerWidth,500)-80

async function connectWallet(){

try{

if(!window.solana){

alert("Install Phantom Wallet")

return
}

provider=window.solana

if(!provider.isPhantom){

alert("Phantom Wallet not found")

return
}

const resp=await provider.connect()

walletAddress=resp.publicKey.toString()

document.getElementById("walletStatus").innerText=
walletAddress.slice(0,6)+"..."+walletAddress.slice(-4)

}catch(e){

console.log(e)

alert("Connection failed")

}

}

document.getElementById("connectBtn").onclick=connectWallet


function bet(duck){

if(!walletAddress){

alert("Connect wallet first")

return
}

bets[duck]++

prizePool+=0.01

document.getElementById("pool").innerText=prizePool.toFixed(2)

}


function startRace(){

if(running)return

if(prizePool===0){

alert("Place a bet first")

return
}

running=true

let pos=[0,0,0,0]

document.getElementById("raceStatus").innerText="Race started!"

function frame(){

if(!running)return

ducks.forEach((duck,i)=>{

pos[i]+=Math.random()*2.5

duck.style.left=pos[i]+"px"

if(pos[i]>trackWidth){

running=false

document.getElementById("raceStatus").innerText=
"🏆 Winner Duck "+(i+1)

let payout=(prizePool*0.9).toFixed(2)

alert("Winner Prize: "+payout+" SOL")

}

})

requestAnimationFrame(frame)

}

frame()

}


function resetRace(){

running=false

ducks.forEach(d=>d.style.left="0px")

prizePool=0

bets=[0,0,0,0]

document.getElementById("pool").innerText="0"

document.getElementById("raceStatus").innerText="Waiting..."

}

</script>

</body>

</html>
