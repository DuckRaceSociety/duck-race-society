<!DOCTYPE html>
<html>
<head>

<title>Duck Race Society</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
background:linear-gradient(120deg,#4ec5ff,#7cf0ff,#ffd000);
background-size:400% 400%;
animation:bgmove 10s infinite;
}

@keyframes bgmove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

h1{
color:white;
font-size:50px;
margin-top:20px;
text-shadow:0 0 20px #fff;
}

.track{
width:1000px;
margin:auto;
margin-top:40px;
}

.lane{
height:70px;
background:white;
margin:8px 0;
border-radius:40px;
position:relative;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.finish{
position:absolute;
right:0;
top:0;
bottom:0;
width:8px;
background:red;
}

.duck{
position:absolute;
left:10px;
top:15px;
font-size:35px;
animation:bounce 1s infinite;
}

@keyframes bounce{
0%{transform:translateY(0)}
50%{transform:translateY(-5px)}
100%{transform:translateY(0)}
}

button{
margin-top:20px;
padding:18px 40px;
font-size:22px;
background:#ffd000;
border:none;
border-radius:10px;
cursor:pointer;
box-shadow:0 0 20px #ffd000;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 40px #ffd000;
}

#winner{
font-size:40px;
color:white;
margin-top:30px;
animation:flash 1s infinite;
}

@keyframes flash{
0%{opacity:1}
50%{opacity:0.5}
100%{opacity:1}
}

.water{
position:fixed;
bottom:0;
left:0;
width:100%;
height:120px;
background:linear-gradient(#2aa7ff,#0077ff);
animation:wave 6s infinite linear;
}

@keyframes wave{
0%{background-position:0 0}
100%{background-position:1000px 0}
}

</style>
</head>

<body>

<h1>🦆 Duck Race Society</h1>

<button onclick="startRace()">START RACE</button>

<div class="track" id="track"></div>

<div id="winner"></div>

<div class="water"></div>

<script>

let ducks=[]
let positions=[]

function createDucks(){

let track=document.getElementById("track")

for(let i=0;i<25;i++){

let lane=document.createElement("div")
lane.className="lane"

let duck=document.createElement("div")
duck.className="duck"
duck.innerHTML="🦆"

let finish=document.createElement("div")
finish.className="finish"

lane.appendChild(duck)
lane.appendChild(finish)

track.appendChild(lane)

ducks.push(duck)
positions.push(10)

}

}

function startRace(){

let race=setInterval(function(){

for(let i=0;i<ducks.length;i++){

positions[i]+=Math.random()*14

ducks[i].style.left=positions[i]+"px"

if(positions[i]>900){

clearInterval(race)

document.getElementById("winner").innerHTML=
"🏆 WINNER DUCK #"+(i+1)

}

}

},100)

}

createDucks()

</script>

</body>
</html>
