<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
getFirestore, 
collection, 
addDoc, 
onSnapshot, 
deleteDoc, 
doc,
getDocs 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "APIKEY",
authDomain: "duck-race-society.firebaseapp.com",
projectId: "duck-race-society",
storageBucket: "duck-race-society.firebasestorage.app",
messagingSenderId: "249037009909",
appId: ""
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const lobbyRef = collection(db,"lobby");


// TELEGRAM
let playerName = "Gast";
let playerId = "guest_"+Math.random().toString(36);

if(window.Telegram){

const tg = window.Telegram.WebApp;

tg.ready();
tg.expand();

if(tg.initDataUnsafe?.user){

playerName = tg.initDataUnsafe.user.first_name;
playerId = tg.initDataUnsafe.user.id;

}

}

document.getElementById("player").innerHTML =
"👤 Spieler: "+playerName;


// LOBBY STATE
let players = [];

function updatePlayers(){

const list = document.getElementById("players");
list.innerHTML = "";

players.forEach(p=>{

const li = document.createElement("li");
li.innerText = p.name;

list.appendChild(li);

});

}


// JOIN RACE
window.joinRace = async function(){

// prüfen ob Spieler schon existiert
const snapshot = await getDocs(lobbyRef);

let exists = false;

snapshot.forEach(doc=>{
if(doc.data().id == playerId){
exists = true;
}
});

if(exists){
alert("Du bist bereits im Rennen");
return;
}

await addDoc(lobbyRef,{
name: playerName,
id: playerId
});

}


// START RACE
window.startRace = function(){

if(players.length < 2){

alert("⚠️ Mindestens 2 Spieler benötigt");
return;

}

alert("🏁 Rennen startet!");

setTimeout(endRace,5000);

}


// END RACE
async function endRace(){

alert("🏆 Rennen beendet!");

const snapshot = await getDocs(lobbyRef);

snapshot.forEach(async (d)=>{

await deleteDoc(doc(db,"lobby",d.id));

});

}


// LIVE LOBBY
onSnapshot(lobbyRef,(snapshot)=>{

players = [];

snapshot.forEach(doc=>{

players.push(doc.data());

});

updatePlayers();

});

</script>
