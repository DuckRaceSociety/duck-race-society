<!DOCTYPE html>
<html>
<head>
<title>Duck Race Society</title>

<style>

body{
font-family:Arial;
background:#6ec6ff;
text-align:center;
}

h1{
color:white;
}

.track{
width:80%;
margin:auto;
margin-top:40px;
}

.lane{
background:white;
height:70px;
margin:20px 0;
border-radius:40px;
position:relative;
}

.duck{
font-size:40px;
position:absolute;
left:0;
top:10px;
}

.finish{
position:absolute;
right:10px;
top:0;
bottom:0;
width:5px;
background:red;
}

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:10px;
background:#ffd000;
cursor:pointer;
}

#winner{
font-size:30px;
margin-top:30px;
color:white;
}

</style>
</head>

<body>

<h1>🦆 Duck Race Society</h1>

<button onclick="startRace()">START RACE</button>

<div class="track">

<div class="lane">
<div class="duck" id="duck1">🦆</div>
<div class="finish"></div>
</div>

<div class="lane">
<div class="duck" id="duck2">🦆</div>
<div class="finish"></div>
</div>

<div class="lane">
<div class="duck" id="duck3">🦆</div>
<div class="finish"></div>
</div>

<div class="lane">
<div class="duck" id="duck4">🦆</div>
<div class="finish"></div>
</div>

</div>

<div id="winner"></div>

<script>

function startRace(){

let ducks=[
document.getElementById("duck1"),
document.getElementById("duck2"),
document.getElementById("duck3"),
document.getElementById("duck4")
]

let positions=[0,0,0,0]

let race=setInterval(function(){

for(let i=0;i<ducks.length;i++){

positions[i]+=Math.random()*10
ducks[i].style.left=positions[i]+"px"

if(positions[i]>700){

clearInterval(race)

document.getElementById("winner").innerHTML=
"🏆 Winner: Duck "+(i+1)

}

}

},100)

}

</script>

</body>
</html>
