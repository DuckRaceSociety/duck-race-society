<!DOCTYPE html>
<html>
<head>
<title>Duck Race Society PRO</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
background:linear-gradient(120deg,#4ec5ff,#7cf0ff,#ffd000);
background-size:400% 400%;
animation:bgmove 12s infinite;
}

@keyframes bgmove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

h1{
color:white;
font-size:48px;
text-shadow:0 0 20px #fff;
}

.track{
width:1000px;
margin:auto;
margin-top:40px;
}

.lane{
height:60px;
background:white;
margin:6px 0;
border-radius:40px;
position:relative;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
overflow:hidden;
}

.finish{
position:absolute;
right:0;
top:0;
bottom:0;
width:10px;
background:red;
}

.duck{
position:absolute;
left:10px;
top:12px;
font-size:28px;
animation:bounce 0.6s infinite;
}

@keyframes bounce{
0%{transform:translateY(0)}
50%{transform:translateY(-6px)}
100%{transform:translateY(0)}
}

button{
margin:10px;
padding:16px 30px;
font-size:20px;
background:#ffd000;
border:none;
border-radius:10px;
cursor:pointer;
box-shadow:0 0 15px #ffd000;
}

button:hover{
transform:scale(1.1);
}

#winner{
font-size:40px;
color:white;
margin-top:20px;
}

.legendary{color:gold}
.epic{color:#a335ee}
.rare{color:#0070ff}
.common{color:#444}

</style>
</head>

<body>

<h1>🦆 Duck Race Society PRO</h1>

<button onclick="connectWallet()">👛 Connect Wallet</button>
<button onclick="mintNFT()">🪙 Mint Duck NFT</button>
<button onclick="startRace()">🚀 Start Race</button>
<button onclick="resetRace()">🔄 Reset</button>

<div class="track" id="track"></div>

<div id="winner"></div>

<script>

let ducks=[]
let positions=[]
let race=null

let rarities=["legendary","epic","rare","common"]

function createDucks(){

let track=document.getElementById("track")

for(let i=0;i<40;i++){

let lane=document.createElement("div")
lane.className="lane"

let duck=document.createElement("div")
duck.className="duck"

let rarity=rarities[Math.floor(Math.random()*rarities.length)]

duck.classList.add(rarity)
duck.innerHTML="🦆 "+rarity

let finish=document.createElement("div")
finish.className="finish"

lane.appendChild(duck)
lane.appendChild(finish)
track.appendChild(lane)

ducks.push({element:duck,rarity:rarity})
positions.push(10)

}

}

function rarityBoost(r){

if(r=="legendary") return 18
if(r=="epic") return 14
if(r=="rare") return 12
return 10

}

function startRace(){

if(race) clearInterval(race)

document.getElementById("winner").innerHTML=""

race=setInterval(function(){

for(let i=0;i<ducks.length;i++){

let boost=Math.random()*rarityBoost(ducks[i].rarity)

positions[i]+=boost

ducks[i].element.style.left=positions[i]+"px"

if(positions[i]>900){

clearInterval(race)

ducks[i].element.style.fontSize="40px"

document.getElementById("winner").innerHTML=
"🏆 WINNER: "+ducks[i].rarity.toUpperCase()+" DUCK"

}

}

},80)

}

function resetRace(){

clearInterval(race)

positions=[]

for(let i=0;i<ducks.length;i++){

positions.push(10)
ducks[i].element.style.left="10px"

}

document.getElementById("winner").innerHTML=""

}

function mintNFT(){

alert("Minting soon! Connect to Web3 contract.")

window.open("https://launchmynft.io","_blank")

}

async function connectWallet(){

if(window.ethereum){

let accounts=await window.ethereum.request({
method:"eth_requestAccounts"
})

alert("Connected: "+accounts[0])

}else{

alert("Install MetaMask!")

}

}

createDucks()

</script>

</body>
</html>
