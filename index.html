<!DOCTYPE html>
<html>
<head>
<title>Duck Race Society TRC</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
}

h1{
color:#facc15;
}

.track{
width:90%;
height:400px;
border:5px solid white;
margin:auto;
position:relative;
background:#1e293b;
overflow:hidden;
}

.finish{
position:absolute;
right:0;
top:0;
width:5px;
height:100%;
background:red;
}

.duck{
position:absolute;
left:0;
font-size:32px;
}

.legendary{color:gold}
.epic{color:violet}
.rare{color:#38bdf8}
.common{color:white}

button{
padding:12px 25px;
font-size:16px;
margin:10px;
cursor:pointer;
}

input,select{
padding:10px;
font-size:16px;
}

#winner{
font-size:26px;
margin-top:20px;
color:#22c55e;
}

</style>
</head>

<body>

<h1>Duck Race Society (TRC) 🦆🔥</h1>

<p>Enter wallet to join the race</p>

<input id="wallet" placeholder="Wallet">

<select id="rarity">
<option value="legendary">Legendary</option>
<option value="epic">Epic</option>
<option value="rare">Rare</option>
<option value="common">Common</option>
</select>

<button onclick="addDuck()">Join Race</button>

<div class="track" id="track">

<div class="finish"></div>

</div>

<button onclick="startRace()">Start Race</button>

<div id="winner"></div>

<script>

let ducks=[]
let track=document.getElementById("track")

function addDuck(){

let wallet=document.getElementById("wallet").value
let rarity=document.getElementById("rarity").value

if(wallet==="") return

let duck=document.createElement("div")

duck.className="duck "+rarity

duck.innerHTML="🦆 "+wallet.slice(0,6)

duck.style.top=(ducks.length*40)+"px"

track.appendChild(duck)

ducks.push({element:duck,rarity:rarity,name:wallet})

document.getElementById("wallet").value=""

}

function getSpeed(rarity){

if(rarity==="legendary") return 900+Math.random()*200
if(rarity==="epic") return 800+Math.random()*200
if(rarity==="rare") return 700+Math.random()*200
return 600+Math.random()*200

}

function startRace(){

let best=0
let winner=""

ducks.forEach(d=>{

let distance=getSpeed(d.rarity)

d.element.style.transition="4s linear"
d.element.style.left=distance+"px"

if(distance>best){

best=distance
winner=d.name

}

})

setTimeout(()=>{

document.getElementById("winner").innerHTML="🏆 Winner: "+winner

},4200)

}

</script>

</body>
</html>
