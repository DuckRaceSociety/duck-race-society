<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">

<title>Duck Race Society</title>

<meta http-equiv="Content-Security-Policy"
content="default-src 'self' https: data: blob: 'unsafe-inline' 'unsafe-eval'; connect-src https: wss:;">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<script defer src="https://unpkg.com/@solana/web3.js@1.91.8/lib/index.iife.min.js"></script>

<style>

:root{
--gold:#FFD700;
--bg:#0f0f0f;
--card:#1b1b1b;
}

body{
margin:0;
font-family:'Orbitron',sans-serif;
background:var(--bg);
color:white;
text-align:center;
padding:10px;
}

header{
background:black;
padding:20px;
border-bottom:2px solid var(--gold);
}

h1{
color:var(--gold);
margin:0;
}

button{
width:100%;
padding:16px;
margin:10px 0;
border:none;
border-radius:10px;
background:var(--gold);
font-weight:bold;
font-size:16px;
}

.section{
padding:20px 5px;
}

.race-track{
background:#222;
padding:10px;
border-radius:10px;
position:relative;
}

.finish{
position:absolute;
right:5px;
top:0;
bottom:0;
width:4px;
background:red;
}

.lane{
height:45px;
margin:8px 0;
background:#333;
border-radius:8px;
position:relative;
overflow:hidden;
}

.duck{
position:absolute;
left:0;
top:5px;
font-size:28px;
}

.status{
color:#aaa;
margin-top:10px;
}

.pool{
color:#00ff9c;
font-size:18px;
}

</style>

</head>

<body>

<header>

<h1>🦆 Duck Race Society</h1>
<p>Solana Web3 Duck Racing</p>

</header>

<section class="section">

<h2>Wallet</h2>

<button id="walletBtn">Connect Phantom</button>

<p id="walletStatus">Not connected</p>

</section>

<section class="section">

<h2>Bet</h2>

<button onclick="placeBet(0)">Pirate Duck</button>
<button onclick="placeBet(1)">Cyber Duck</button>
<button onclick="placeBet(2)">Golden Duck</button>
<button onclick="placeBet(3)">Alien Duck</button>

<p class="pool">Prize Pool: <span id="pool">0</span> SOL</p>

</section>

<section class="section">

<h2>Race</h2>

<button onclick="startRace()">Start Race</button>
<button onclick="resetRace()">Reset</button>

<p class="status" id="raceStatus">Waiting for bets...</p>

<div class="race-track">

<div class="finish"></div>

<div class="lane"><div class="duck">🦆</div></div>
<div class="lane"><div class="duck">🦆</div></div>
<div class="lane"><div class="duck">🦆</div></div>
<div class="lane"><div class="duck">🦆</div></div>

</div>

</section>

<script>

let provider
let wallet=null

let prizePool=0
let bets=[0,0,0,0]

let running=false

const ducks=[...document.querySelectorAll(".duck")]
const trackWidth=Math.min(window.innerWidth,500)-90

/* ---------------- RPC FALLBACK ---------------- */

const RPC_ENDPOINTS=[
"https://rpc.ankr.com/solana",
"https://api.mainnet-beta.solana.com"
]

let connection=new solanaWeb3.Connection(RPC_ENDPOINTS[0])

/* ---------------- WALLET ---------------- */

async function connectWallet(){

try{

const providerDetected =
window.phantom?.solana ||
(window.solana?.isPhantom ? window.solana : null)

if(!providerDetected){

alert("Install Phantom Wallet")

return
}

provider=providerDetected

const resp=await provider.connect()

wallet=resp.publicKey.toString()

document.getElementById("walletStatus").innerText =
wallet.slice(0,6)+"..."+wallet.slice(-4)

}catch(err){

console.log(err)

alert("Wallet connection failed")

}

}

document.getElementById("walletBtn").onclick=connectWallet

/* ---------------- BETTING ---------------- */

function placeBet(duck){

if(!wallet){

alert("Connect wallet first")

return
}

bets[duck]++

prizePool+=0.01

document.getElementById("pool").innerText=prizePool.toFixed(2)

}

/* ---------------- RACE ENGINE ---------------- */

function startRace(){

if(running) return

if(prizePool===0){

alert("Place a bet first")

return
}

running=true

let pos=[0,0,0,0]

document.getElementById("raceStatus").innerText="Race started!"

function frame(){

if(!running) return

ducks.forEach((duck,i)=>{

pos[i]+=Math.random()*2.2

duck.style.left=pos[i]+"px"

if(pos[i]>trackWidth){

running=false

finishRace(i)

}

})

requestAnimationFrame(frame)

}

frame()

}

function finishRace(winner){

document.getElementById("raceStatus").innerText =
"🏆 Winner Duck "+(winner+1)

let reward=(prizePool*0.9).toFixed(2)

alert("Winner Prize: "+reward+" SOL")

}

/* ---------------- RESET ---------------- */

function resetRace(){

running=false

ducks.forEach(d=>d.style.left="0px")

prizePool=0

bets=[0,0,0,0]

document.getElementById("pool").innerText="0"

document.getElementById("raceStatus").innerText="Waiting..."

}

</script>

</body>
</html>
